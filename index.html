<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Referrer-Policy" content="no-referrer" />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="dark" />
<title>🎬 Pro Federasyon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

<!-- Plyr — profesyonel video player UI -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://cdn.plyr.io" crossorigin />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #player-wrap { width: 100%; height: 100%; position: relative; }

  :root {
    --plyr-color-main: #e50914;
    --plyr-video-background: #000;
    --plyr-menu-background: rgba(20,20,20,0.92);
    --plyr-menu-color: #fff;
    --plyr-tooltip-background: rgba(20,20,20,0.92);
    --plyr-tooltip-color: #fff;
    --plyr-video-controls-background: linear-gradient(transparent, rgba(0,0,0,0.75));
  }
  .plyr { width: 100%; height: 100%; --plyr-font-family: inherit; }
  .plyr--video { height: 100%; }
  .plyr video { object-fit: contain; background: #000; }

  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; z-index: 50;
    transition: opacity .4s;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 56px; height: 56px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #e50914;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader-text { margin-top: 18px; font-size: 14px; opacity: .65; letter-spacing: .5px; }

  #error {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #000; z-index: 60;
    padding: 24px; text-align: center;
  }
  #error.show { display: flex; flex-direction: column; }
  #error-icon { font-size: 56px; margin-bottom: 16px; }
  #error-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  #error-msg { font-size: 14px; opacity: .65; max-width: 480px; line-height: 1.5; }
  #retry-btn {
    margin-top: 20px; padding: 10px 22px;
    background: #e50914; color: #fff;
    border: 0; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: transform .15s, background .15s;
  }
  #retry-btn:hover { background: #f6121d; transform: scale(1.04); }

  #buffering {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: none; pointer-events: none; z-index: 40;
  }
  #buffering.show { display: block; }
  #buffering .spinner { width: 48px; height: 48px; }

  #stats {
    position: fixed; top: 12px; right: 12px;
    background: rgba(0,0,0,0.55);
    padding: 6px 10px; border-radius: 6px;
    font-size: 11px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 30;
    line-height: 1.5;
  }
  #stats.show { opacity: .85; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loader-text">Video hazırlanıyor…</div>
</div>

<div id="error">
  <div id="error-icon">⚠️</div>
  <div id="error-title">Video oynatılamadı</div>
  <div id="error-msg">Yayın geçici olarak erişilemez olabilir.</div>
  <button id="retry-btn">Tekrar Dene</button>
</div>

<div id="buffering"><div class="spinner"></div></div>
<div id="stats"></div>

<div id="stage">
  <div id="player-wrap">
    <video id="v" controls playsinline></video>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
(function () {
  "use strict";

  const $loader   = document.getElementById("loader");
  const $loaderTx = document.getElementById("loader-text");
  const $error    = document.getElementById("error");
  const $errorMsg = document.getElementById("error-msg");
  const $retry    = document.getElementById("retry-btn");
  const $buffering= document.getElementById("buffering");
  const $stats    = document.getElementById("stats");
  const $v        = document.getElementById("v");

  // ===== Format tespiti =====
  // Desteklenen tüm formatlar URL uzantısı veya ?type= ile tespit edilir.
  const FORMAT_HLS    = "hls";      // .m3u8, .m3u
  const FORMAT_DASH   = "dash";     // .mpd
  const FORMAT_FLV    = "flv";      // .flv
  const FORMAT_VIDEO  = "video";    // mp4, webm, ogv, mov, mkv, m4v, ts, avi, 3gp
  const FORMAT_AUDIO  = "audio";    // mp3, m4a, aac, ogg, oga, flac, wav, opus
  const FORMAT_YT     = "youtube";  // youtube.com / youtu.be
  const FORMAT_VIMEO  = "vimeo";    // vimeo.com
  const FORMAT_IFRAME = "iframe";   // 3rd-party embed: iframe.php / /embed/ / /player/

  // Bilinen embed pattern'leri ve host ipuçları
  const EMBED_URL_PATTERNS = [
    "iframe.php", "/embed/", "/embed?", "/player/", "/play/", "/play?",
    "/watch?", "playerjs", "vid.php", "stream.php"
  ];
  const EMBED_HOST_HINTS = [
    "dplayer", "rapidvid", "rpdrm", "moly", "tau-video", "voe.sx",
    "streamtape", "doodstream", "filemoon", "mixdrop", "fastream",
    "vidoza", "uqload", "hxfile", "okru"
  ];

  const EXT_MIME = {
    mp4:  "video/mp4",
    m4v:  "video/mp4",
    mov:  "video/mp4",
    webm: "video/webm",
    ogv:  "video/ogg",
    ogg:  "video/ogg",
    mkv:  "video/x-matroska",
    ts:   "video/mp2t",
    avi:  "video/x-msvideo",
    "3gp": "video/3gpp",
    // audio
    mp3:  "audio/mpeg",
    m4a:  "audio/mp4",
    aac:  "audio/aac",
    oga:  "audio/ogg",
    flac: "audio/flac",
    wav:  "audio/wav",
    opus: "audio/ogg",
  };
  const AUDIO_EXTS = ["mp3", "m4a", "aac", "oga", "flac", "wav", "opus"];

  function detectFormat(url, forced) {
    if (forced) {
      const f = forced.toLowerCase();
      if (["hls", "m3u8"].includes(f)) return FORMAT_HLS;
      if (["dash", "mpd"].includes(f)) return FORMAT_DASH;
      if (f === "flv")                  return FORMAT_FLV;
      if (f === "youtube")              return FORMAT_YT;
      if (f === "vimeo")                return FORMAT_VIMEO;
      if (f === "audio")                return FORMAT_AUDIO;
      if (f === "video")                return FORMAT_VIDEO;
      if (["iframe", "embed"].includes(f)) return FORMAT_IFRAME;
    }
    const lower = url.toLowerCase();
    if (/youtube\.com\/watch|youtu\.be\//.test(lower))     return FORMAT_YT;
    if (/vimeo\.com\//.test(lower))                         return FORMAT_VIMEO;
    if (/\.m3u8?(\?|$)/.test(lower))                        return FORMAT_HLS;
    if (/\.mpd(\?|$)/.test(lower))                          return FORMAT_DASH;
    if (/\.flv(\?|$)/.test(lower))                          return FORMAT_FLV;
    const ext = (lower.split("?")[0].split("#")[0].split(".").pop() || "");
    if (AUDIO_EXTS.includes(ext))                           return FORMAT_AUDIO;
    // Tanınmış medya uzantısı YOKSA ve embed pattern/host ipucu varsa → iframe
    let host = "";
    try { host = new URL(url).hostname.toLowerCase(); } catch (e) {}
    if (EMBED_URL_PATTERNS.some(p => lower.indexOf(p) >= 0)) return FORMAT_IFRAME;
    if (host && EMBED_HOST_HINTS.some(h => host.indexOf(h) >= 0)) return FORMAT_IFRAME;
    // Uzantı yoksa (örn. /watch, /v/abc) — yine iframe varsay
    const knownVideoExts = ["mp4","m4v","mov","webm","ogv","ogg","mkv","ts","avi","3gp",...AUDIO_EXTS];
    if (!knownVideoExts.includes(ext)) return FORMAT_IFRAME;
    return FORMAT_VIDEO;
  }

  function getSrc() {
    const p = new URLSearchParams(location.search);
    const v = p.get("v");
    const u = p.get("u");
    const t = p.get("t");
    if (t) {
      try {
        const title = decodeURIComponent(t);
        document.title = `▶ ${title}`;
      } catch (e) {}
    }
    if (v) {
      try {
        let b = v.replace(/-/g, "+").replace(/_/g, "/");
        while (b.length % 4) b += "=";
        return atob(b);
      } catch (e) { return null; }
    }
    if (u) {
      try { return decodeURIComponent(u); } catch (e) { return u; }
    }
    return null;
  }

  function getForcedType() {
    return new URLSearchParams(location.search).get("type");
  }

  function showLoader(text) {
    if (text) $loaderTx.textContent = text;
    $loader.classList.remove("hide");
  }
  function hideLoader() { $loader.classList.add("hide"); }
  function showError(msg) {
    hideLoader();
    if (msg) $errorMsg.textContent = msg;
    $error.classList.add("show");
  }
  function hideError() { $error.classList.remove("show"); }

  // ===== Dinamik script yükleyici (lazy) =====
  const _scriptCache = {};
  function loadScript(src) {
    if (_scriptCache[src]) return _scriptCache[src];
    _scriptCache[src] = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src; s.async = true;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error("Yüklenemedi: " + src));
      document.head.appendChild(s);
    });
    return _scriptCache[src];
  }

  const src = getSrc();
  if (!src) {
    showError("Video kaynağı bulunamadı (?v veya ?u parametresi yok).");
    return;
  }

  // ---------- Plyr ----------
  const plyrOptions = {
    debug: false,
    autoplay: true,
    clickToPlay: true,
    hideControls: true,
    keyboard: { focused: true, global: true },
    tooltips: { controls: true, seek: true },
    seekTime: 10,
    volume: 1,
    settings: ["captions", "quality", "speed", "loop"],
    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
    controls: [
      "play-large", "rewind", "play", "fast-forward",
      "progress", "current-time", "duration",
      "mute", "volume",
      "captions", "settings", "pip", "airplay", "fullscreen",
    ],
    fullscreen: { enabled: true, fallback: true, iosNative: true },
    storage: { enabled: true, key: "wp_prefs" },
    youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1 },
    vimeo:   { byline: false, portrait: false, title: false, transparent: false },
  };

  let plyr = null;
  let hls  = null;
  let dash = null;     // shaka.Player veya dashjs.MediaPlayer
  let flv  = null;     // flv.js Player
  let retryCount = 0;
  const MAX_RETRIES = 5;

  // ---------- HLS.js — VOD optimize, uzun/büyük videolar için ----------
  const hlsConfig = {
    enableWorker: true,
    maxBufferLength: 60,
    maxMaxBufferLength: 600,
    maxBufferSize: 120 * 1024 * 1024,
    maxBufferHole: 0.5,
    highBufferWatchdogPeriod: 2,
    nudgeOffset: 0.1,
    nudgeMaxRetry: 5,
    backBufferLength: 90,
    abrEwmaFastVoD: 3.0,
    abrEwmaSlowVoD: 9.0,
    abrEwmaDefaultEstimate: 1_000_000,
    abrBandWidthFactor: 0.95,
    abrBandWidthUpFactor: 0.7,
    startLevel: -1,
    capLevelToPlayerSize: true,
    testBandwidth: true,
    lowLatencyMode: false,
    progressive: false,
    startFragPrefetch: true,
    manifestLoadingTimeOut: 15_000,
    manifestLoadingMaxRetry: 6,
    manifestLoadingRetryDelay: 500,
    manifestLoadingMaxRetryTimeout: 64_000,
    levelLoadingTimeOut: 15_000,
    levelLoadingMaxRetry: 6,
    levelLoadingRetryDelay: 500,
    levelLoadingMaxRetryTimeout: 64_000,
    fragLoadingTimeOut: 30_000,
    fragLoadingMaxRetry: 8,
    fragLoadingRetryDelay: 500,
    fragLoadingMaxRetryTimeout: 64_000,
    appendErrorMaxRetry: 5,
    xhrSetup: function (xhr) { try { xhr.withCredentials = false; } catch (e) {} },
  };

  function attemptRecover(data) {
    if (!hls) return;
    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
      try { hls.startLoad(); } catch (e) {}
    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
      try { hls.recoverMediaError(); }
      catch (e) { try { hls.swapAudioCodec(); hls.recoverMediaError(); } catch (e2) {} }
    } else {
      retryCount++;
      if (retryCount <= MAX_RETRIES) {
        setTimeout(() => initStream(src), Math.min(3000 * retryCount, 15000));
      } else {
        showError("Yayın açılamadı. Lütfen birkaç dakika sonra tekrar deneyin.");
      }
    }
  }

  // Buffering UI
  let bufTimer = null;
  let playbackStarted = false;
  function showBuffering() {
    if (playbackStarted) return;
    clearTimeout(bufTimer);
    bufTimer = setTimeout(() => $buffering.classList.add("show"), 400);
  }
  function hideBuffering() {
    clearTimeout(bufTimer);
    $buffering.classList.remove("show");
  }
  function markPlaybackStarted() {
    playbackStarted = true;
    hideLoader();
    hideBuffering();
  }

  // Stats overlay
  let statsVisible = false;
  function updateStats() {
    if (!statsVisible) return;
    try {
      let info = "";
      if (hls) {
        const lvl = hls.currentLevel >= 0 ? hls.levels[hls.currentLevel] : null;
        const bw  = (hls.bandwidthEstimate / 1000).toFixed(0);
        const q   = lvl ? `${lvl.width}×${lvl.height} @ ${(lvl.bitrate/1000).toFixed(0)}kbps` : "auto";
        info = `📊 HLS · ${q}<br/>BW ${bw} kbps`;
      } else if (dash && dash.getVariantTracks) {
        const tracks = dash.getVariantTracks() || [];
        const active = tracks.find(t => t.active);
        info = active ? `📊 DASH · ${active.width}×${active.height} @ ${(active.bandwidth/1000).toFixed(0)}kbps` : "📊 DASH";
      } else {
        info = `📊 ${($v.videoWidth||0)}×${($v.videoHeight||0)}`;
      }
      const buf = $v.buffered.length
        ? ($v.buffered.end($v.buffered.length-1) - $v.currentTime).toFixed(1) : "0";
      $stats.innerHTML = `${info}<br/>Buffer ${buf}s`;
    } catch (e) {}
  }
  setInterval(updateStats, 1000);

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "i" || e.key === "I") {
      statsVisible = !statsVisible;
      $stats.classList.toggle("show", statsVisible);
    }
    if (!plyr) return;
    switch (e.key) {
      case "j": case "J": plyr.currentTime = Math.max(0, plyr.currentTime - 10); break;
      case "l": case "L": plyr.currentTime = Math.min(plyr.duration || 0, plyr.currentTime + 10); break;
      case "k": case "K": plyr.togglePlay(); break;
      case "0": case "1": case "2": case "3": case "4":
      case "5": case "6": case "7": case "8": case "9":
        if (plyr.duration) plyr.currentTime = plyr.duration * (parseInt(e.key, 10) / 10);
        break;
    }
  });

  function destroyStream() {
    try { hls && hls.destroy(); } catch (e) {}
    try { dash && dash.destroy && dash.destroy(); } catch (e) {}
    try { flv && flv.destroy && flv.destroy(); } catch (e) {}
    hls = dash = flv = null;
  }

  // ===== Format-spesifik başlatıcılar =====

  function playHls(url) {
    if ($v.canPlayType("application/vnd.apple.mpegurl")) {
      plyr.source = { type: "video", sources: [{ src: url, type: "application/vnd.apple.mpegurl" }] };
      $v.addEventListener("loadedmetadata", hideLoader, { once: true });
      return;
    }
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls(hlsConfig);
      hls.loadSource(url);
      hls.attachMedia($v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        retryCount = 0; hideLoader();
        $v.play().catch(() => { $v.muted = true; $v.play().catch(() => {}); });
      });
      hls.on(Hls.Events.FRAG_BUFFERED, hideBuffering);
      hls.on(Hls.Events.ERROR, (_e, data) => { if (data.fatal) attemptRecover(data); });
    } else {
      showError("Tarayıcınız HLS oynatmayı desteklemiyor.");
    }
  }

  function playDash(url) {
    showLoader("DASH motoru yükleniyor…");
    // Shaka Player — en geniş codec ve DRM desteği
    loadScript("https://cdn.jsdelivr.net/npm/shaka-player@4.7.10/dist/shaka-player.compiled.min.js")
      .then(() => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          showError("Tarayıcınız DASH (.mpd) oynatmayı desteklemiyor.");
          return;
        }
        dash = new shaka.Player($v);
        dash.configure({
          streaming: {
            bufferingGoal: 60,
            rebufferingGoal: 2,
            bufferBehind: 60,
            retryParameters: { maxAttempts: 6, baseDelay: 500, backoffFactor: 2 },
          },
          abr: { enabled: true },
        });
        dash.addEventListener("error", (e) => {
          console.error("[shaka]", e.detail);
          showError("DASH yayını açılamadı.");
        });
        return dash.load(url).then(() => {
          hideLoader();
          $v.play().catch(() => { $v.muted = true; $v.play().catch(() => {}); });
        });
      })
      .catch(err => showError("DASH motoru yüklenemedi."));
  }

  function playFlv(url) {
    showLoader("FLV motoru yükleniyor…");
    loadScript("https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js")
      .then(() => {
        if (!flvjs.isSupported()) {
          showError("Tarayıcınız FLV oynatmayı desteklemiyor.");
          return;
        }
        flv = flvjs.createPlayer({ type: "flv", url: url, isLive: false, cors: true });
        flv.attachMediaElement($v);
        flv.on(flvjs.Events.ERROR, () => showError("FLV yayını açılamadı."));
        flv.load();
        hideLoader();
        flv.play().catch(() => { $v.muted = true; flv.play().catch(() => {}); });
      })
      .catch(() => showError("FLV motoru yüklenemedi."));
  }

  function playProgressive(url, isAudio) {
    const ext = (url.split("?")[0].split("#")[0].split(".").pop() || "mp4").toLowerCase();
    const mime = EXT_MIME[ext] || (isAudio ? "audio/mpeg" : "video/mp4");
    plyr.source = {
      type: isAudio ? "audio" : "video",
      sources: [{ src: url, type: mime }],
    };
    const onMeta = () => hideLoader();
    const onErr  = () => {
      // MKV/AVI gibi sorunlu container'lar için kullanıcıya net mesaj
      const hint = (ext === "mkv" || ext === "avi")
        ? "Bu video formatı (." + ext + ") tarayıcınız tarafından desteklenmiyor olabilir."
        : "Video dosyası yüklenemedi.";
      showError(hint);
    };
    $v.addEventListener("loadedmetadata", onMeta, { once: true });
    $v.addEventListener("error", onErr, { once: true });
  }

  function playYouTube(url) {
    // Plyr'ın YouTube provider'ı için video ID'sini çıkar
    let id = null;
    const m1 = url.match(/[?&]v=([^&#]+)/);
    const m2 = url.match(/youtu\.be\/([^?&#]+)/);
    const m3 = url.match(/youtube\.com\/embed\/([^?&#]+)/);
    id = (m1 && m1[1]) || (m2 && m2[1]) || (m3 && m3[1]);
    if (!id) { showError("YouTube video ID bulunamadı."); return; }
    plyr.source = { type: "video", sources: [{ src: id, provider: "youtube" }] };
    hideLoader();
  }

  function playVimeo(url) {
    const m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if (!m) { showError("Vimeo video ID bulunamadı."); return; }
    plyr.source = { type: "video", sources: [{ src: m[1], provider: "vimeo" }] };
    hideLoader();
  }

  function playIframe(url) {
    // 3rd party embed: tüm sayfayı kaplayan iframe — Plyr/video gizlenir.
    // Kaynak host sadece iframe içinde görünür; üst frame ve adres çubuğu maskeli.
    try {
      const stage = document.getElementById("stage");
      stage.innerHTML = "";
      const f = document.createElement("iframe");
      f.src = url;
      f.allow = "autoplay; fullscreen; encrypted-media; picture-in-picture";
      f.allowFullscreen = true;
      f.setAttribute("allowfullscreen", "true");
      f.setAttribute("webkitallowfullscreen", "true");
      f.setAttribute("mozallowfullscreen", "true");
      f.referrerPolicy = "no-referrer";
      f.style.cssText = "position:fixed;inset:0;width:100%;height:100%;border:0;background:#000;";
      stage.appendChild(f);
      markPlaybackStarted();
      // 30 sn içinde hiç yüklenmezse uyarı
      setTimeout(() => {
        if (!playbackStarted) showError("Embed yayın yanıt vermiyor.");
      }, 30000);
      f.addEventListener("load", markPlaybackStarted);
    } catch (e) {
      showError("Embed iframe oluşturulamadı.");
    }
  }

  function initStream(url) {
    destroyStream();
    hideError();
    showLoader("Bağlantı kuruluyor…");

    const fmt = detectFormat(url, getForcedType());
    console.log("[player] format:", fmt, "url:", url);

    switch (fmt) {
      case FORMAT_HLS:    return playHls(url);
      case FORMAT_DASH:   return playDash(url);
      case FORMAT_FLV:    return playFlv(url);
      case FORMAT_AUDIO:  return playProgressive(url, true);
      case FORMAT_YT:     return playYouTube(url);
      case FORMAT_VIMEO:  return playVimeo(url);
      case FORMAT_IFRAME: return playIframe(url);
      case FORMAT_VIDEO:
      default:            return playProgressive(url, false);
    }
  }

  plyr = new Plyr("#v", plyrOptions);
  plyr.on("waiting",  showBuffering);
  plyr.on("playing",  markPlaybackStarted);
  plyr.on("canplay",  hideBuffering);
  plyr.on("seeking",  showBuffering);
  plyr.on("seeked",   hideBuffering);
  plyr.on("stalled",  showBuffering);
  plyr.on("timeupdate", hideLoader);

  let started = false;
  function startOnce() {
    if (started) return;
    started = true;
    initStream(src);
  }
  plyr.on("ready", startOnce);
  setTimeout(startOnce, 800);

  setTimeout(() => {
    if (!playbackStarted && !$loader.classList.contains("hide")) {
      showError("Yayın yanıt vermiyor. Kaynak engellemiş olabilir (CORS / Referer).");
    }
  }, 25000);

  $retry.addEventListener("click", () => {
    retryCount = 0; started = false; playbackStarted = false;
    startOnce();
  });
  window.addEventListener("beforeunload", destroyStream);
})();
</script>
</body>
</html>
