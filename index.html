<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Referrer-Policy" content="no-referrer" />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="dark" />
<title>🎬 Pro Federasyon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

<!-- Plyr — profesyonel video player UI -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://cdn.plyr.io" crossorigin />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #player-wrap { width: 100%; height: 100%; position: relative; }

  :root {
    --plyr-color-main: #e50914;
    --plyr-video-background: #000;
    --plyr-menu-background: rgba(20,20,20,0.92);
    --plyr-menu-color: #fff;
    --plyr-tooltip-background: rgba(20,20,20,0.92);
    --plyr-tooltip-color: #fff;
    --plyr-video-controls-background: linear-gradient(transparent, rgba(0,0,0,0.75));
  }
  .plyr { width: 100%; height: 100%; --plyr-font-family: inherit; }
  .plyr--video { height: 100%; }
  .plyr video { object-fit: contain; background: #000; }

  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; z-index: 50;
    transition: opacity .4s;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 56px; height: 56px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #e50914;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader-text { margin-top: 18px; font-size: 14px; opacity: .65; letter-spacing: .5px; }

  #error {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #000; z-index: 60;
    padding: 24px; text-align: center;
  }
  #error.show { display: flex; flex-direction: column; }
  #error-icon { font-size: 56px; margin-bottom: 16px; }
  #error-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  #error-msg { font-size: 14px; opacity: .65; max-width: 480px; line-height: 1.5; }
  #retry-btn {
    margin-top: 20px; padding: 10px 22px;
    background: #e50914; color: #fff;
    border: 0; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: transform .15s, background .15s;
  }
  #retry-btn:hover { background: #f6121d; transform: scale(1.04); }

  #buffering {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: none; pointer-events: none; z-index: 40;
  }
  #buffering.show { display: block; }
  #buffering .spinner { width: 48px; height: 48px; }

  #stats {
    position: fixed; top: 12px; right: 12px;
    background: rgba(0,0,0,0.55);
    padding: 6px 10px; border-radius: 6px;
    font-size: 11px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 30;
    line-height: 1.5;
  }
  #stats.show { opacity: .85; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loader-text">Video hazırlanıyor…</div>
</div>

<div id="error">
  <div id="error-icon">⚠️</div>
  <div id="error-title">Video oynatılamadı</div>
  <div id="error-msg">Yayın geçici olarak erişilemez olabilir.</div>
  <button id="retry-btn">Tekrar Dene</button>
</div>

<div id="buffering"><div class="spinner"></div></div>
<div id="stats"></div>

<div id="stage">
  <div id="player-wrap">
    <video id="v" controls playsinline></video>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
(function () {
  "use strict";

  const $loader   = document.getElementById("loader");
  const $loaderTx = document.getElementById("loader-text");
  const $error    = document.getElementById("error");
  const $errorMsg = document.getElementById("error-msg");
  const $retry    = document.getElementById("retry-btn");
  const $buffering= document.getElementById("buffering");
  const $stats    = document.getElementById("stats");
  const $v        = document.getElementById("v");

  function getSrc() {
    const p = new URLSearchParams(location.search);
    const v = p.get("v");
    const u = p.get("u");
    const t = p.get("t");
    if (t) {
      try {
        const title = decodeURIComponent(t);
        document.title = `▶ ${title}`;
      } catch (e) {}
    }
    if (v) {
      try {
        let b = v.replace(/-/g, "+").replace(/_/g, "/");
        while (b.length % 4) b += "=";
        return atob(b);
      } catch (e) { return null; }
    }
    if (u) {
      try { return decodeURIComponent(u); } catch (e) { return u; }
    }
    return null;
  }

  function showLoader(text) {
    if (text) $loaderTx.textContent = text;
    $loader.classList.remove("hide");
  }
  function hideLoader() { $loader.classList.add("hide"); }
  function showError(msg) {
    hideLoader();
    if (msg) $errorMsg.textContent = msg;
    $error.classList.add("show");
  }
  function hideError() { $error.classList.remove("show"); }

  const src = getSrc();
  if (!src) {
    showError("Video kaynağı bulunamadı (?v veya ?u parametresi yok).");
    return;
  }

  // ---------- Plyr ----------
  const plyrOptions = {
    debug: false,
    autoplay: true,
    clickToPlay: true,
    hideControls: true,
    keyboard: { focused: true, global: true },
    tooltips: { controls: true, seek: true },
    seekTime: 10,
    volume: 1,
    settings: ["captions", "quality", "speed", "loop"],
    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
    controls: [
      "play-large", "rewind", "play", "fast-forward",
      "progress", "current-time", "duration",
      "mute", "volume",
      "captions", "settings", "pip", "airplay", "fullscreen",
    ],
    fullscreen: { enabled: true, fallback: true, iosNative: true },
    storage: { enabled: true, key: "wp_prefs" },
  };

  let plyr = null;
  let hls  = null;
  let retryCount = 0;
  const MAX_RETRIES = 5;

  // ---------- HLS.js — VOD optimize, uzun/büyük videolar için ----------
  const hlsConfig = {
    enableWorker: true,                 // decoding ana thread'i takmaz

    // Buffer — uzun film + yavaş ağ için kritik
    maxBufferLength: 60,
    maxMaxBufferLength: 600,            // ağ iyiyse 10 dk kadar önden buffer
    maxBufferSize: 120 * 1024 * 1024,   // 120 MB
    maxBufferHole: 0.5,
    highBufferWatchdogPeriod: 2,
    nudgeOffset: 0.1,
    nudgeMaxRetry: 5,
    backBufferLength: 90,

    // ABR — bağlantıya göre otomatik kalite
    abrEwmaFastVoD: 3.0,
    abrEwmaSlowVoD: 9.0,
    abrEwmaDefaultEstimate: 1_000_000,
    abrBandWidthFactor: 0.95,
    abrBandWidthUpFactor: 0.7,
    startLevel: -1,                     // otomatik başla
    capLevelToPlayerSize: true,         // ekrandan büyük çözünürlük yükleme
    testBandwidth: true,

    // VOD
    lowLatencyMode: false,
    progressive: false,
    startFragPrefetch: true,

    // Retry / hata toleransı (manifest, level, fragment)
    manifestLoadingTimeOut: 15_000,
    manifestLoadingMaxRetry: 6,
    manifestLoadingRetryDelay: 500,
    manifestLoadingMaxRetryTimeout: 64_000,

    levelLoadingTimeOut: 15_000,
    levelLoadingMaxRetry: 6,
    levelLoadingRetryDelay: 500,
    levelLoadingMaxRetryTimeout: 64_000,

    fragLoadingTimeOut: 30_000,
    fragLoadingMaxRetry: 8,
    fragLoadingRetryDelay: 500,
    fragLoadingMaxRetryTimeout: 64_000,

    appendErrorMaxRetry: 5,

    xhrSetup: function (xhr) {
      try { xhr.withCredentials = false; } catch (e) {}
    },
  };

  function attemptRecover(data) {
    if (!hls) return;
    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
      console.warn("[hls] network error → startLoad");
      try { hls.startLoad(); } catch (e) {}
    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
      console.warn("[hls] media error → recoverMediaError");
      try { hls.recoverMediaError(); }
      catch (e) {
        try { hls.swapAudioCodec(); hls.recoverMediaError(); } catch (e2) {}
      }
    } else {
      retryCount++;
      if (retryCount <= MAX_RETRIES) {
        setTimeout(() => initStream(src), Math.min(3000 * retryCount, 15000));
      } else {
        showError("Yayın açılamadı. Lütfen birkaç dakika sonra tekrar deneyin.");
      }
    }
  }

  // Buffering UI — kısa duraklamalarda gözükmesin diye 300ms gecikme
  let bufTimer = null;
  function showBuffering() {
    clearTimeout(bufTimer);
    bufTimer = setTimeout(() => $buffering.classList.add("show"), 300);
  }
  function hideBuffering() {
    clearTimeout(bufTimer);
    $buffering.classList.remove("show");
  }

  // Stats overlay (i tuşu ile aç/kapa) — debug için kullanışlı
  let statsVisible = false;
  function updateStats() {
    if (!statsVisible || !hls) return;
    try {
      const lvl = hls.currentLevel >= 0 ? hls.levels[hls.currentLevel] : null;
      const bw  = (hls.bandwidthEstimate / 1000).toFixed(0);
      const buf = $v.buffered.length
        ? ($v.buffered.end($v.buffered.length-1) - $v.currentTime).toFixed(1) : "0";
      const q   = lvl ? `${lvl.width}×${lvl.height} @ ${(lvl.bitrate/1000).toFixed(0)}kbps` : "auto";
      $stats.innerHTML = `📊 ${q}<br/>BW ${bw} kbps<br/>Buffer ${buf}s`;
    } catch (e) {}
  }
  setInterval(updateStats, 1000);

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "i" || e.key === "I") {
      statsVisible = !statsVisible;
      $stats.classList.toggle("show", statsVisible);
    }
    // YouTube-tarzı ek kısayollar
    if (!plyr) return;
    switch (e.key) {
      case "j": case "J": plyr.currentTime = Math.max(0, plyr.currentTime - 10); break;
      case "l": case "L": plyr.currentTime = Math.min(plyr.duration || 0, plyr.currentTime + 10); break;
      case "k": case "K": plyr.togglePlay(); break;
      case "0": case "1": case "2": case "3": case "4":
      case "5": case "6": case "7": case "8": case "9":
        if (plyr.duration) plyr.currentTime = plyr.duration * (parseInt(e.key, 10) / 10);
        break;
    }
  });

  function destroyStream() {
    try { hls && hls.destroy(); } catch (e) {}
    hls = null;
  }

  function initStream(url) {
    destroyStream();
    hideError();
    showLoader("Bağlantı kuruluyor…");

    const isHls = /\.m3u8(\?|$)/i.test(url);

    if (isHls) {
      // Safari/iOS native HLS — Plyr source API
      if ($v.canPlayType("application/vnd.apple.mpegurl")) {
        plyr.source = {
          type: "video",
          sources: [{ src: url, type: "application/vnd.apple.mpegurl" }],
        };
        $v.addEventListener("loadedmetadata", () => hideLoader(), { once: true });
        $v.addEventListener("error", () => showError("Video açılamadı."), { once: true });
        return;
      }
      // HLS.js — direkt video elementine attach et
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls(hlsConfig);
        hls.loadSource(url);
        hls.attachMedia($v);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          retryCount = 0;
          hideLoader();
          $v.play().catch(() => {
            $v.muted = true;
            $v.play().catch(() => {});
          });
        });

        hls.on(Hls.Events.FRAG_BUFFERED, hideBuffering);

        hls.on(Hls.Events.ERROR, (_e, data) => {
          console.error("[hls]", data.type, data.details, data.fatal);
          if (data.fatal) attemptRecover(data);
        });
      } else {
        showError("Tarayıcınız HLS oynatmayı desteklemiyor. Güncel Chrome/Edge/Firefox kullanın.");
      }
    } else {
      // MP4 / WebM — Plyr source API
      const ext = (url.split("?")[0].split(".").pop() || "mp4").toLowerCase();
      const mime = ext === "webm" ? "video/webm" : ext === "ogv" ? "video/ogg" : "video/mp4";
      plyr.source = {
        type: "video",
        sources: [{ src: url, type: mime }],
      };
      const onMeta = () => { hideLoader(); $v.removeEventListener("error", onErr); };
      const onErr  = () => { showError("Video dosyası yüklenemedi."); $v.removeEventListener("loadedmetadata", onMeta); };
      $v.addEventListener("loadedmetadata", onMeta, { once: true });
      $v.addEventListener("error", onErr, { once: true });
    }
  }

  plyr = new Plyr("#v", plyrOptions);
  plyr.on("waiting",  showBuffering);
  plyr.on("playing",  hideBuffering);
  plyr.on("canplay",  hideBuffering);
  plyr.on("seeking",  showBuffering);
  plyr.on("seeked",   hideBuffering);
  plyr.on("stalled",  showBuffering);

  // Plyr "ready" event'ini beklemeden başlat — bazı tarayıcılarda fire olmuyor
  let started = false;
  function startOnce() {
    if (started) return;
    started = true;
    console.log("[player] starting stream:", src);
    initStream(src);
  }
  plyr.on("ready", startOnce);
  // Güvenlik ağı: Plyr ready 800ms içinde gelmezse zorla başlat
  setTimeout(startOnce, 800);

  // 25 sn içinde manifest gelmezse kullanıcıya hata göster
  setTimeout(() => {
    if (!$loader.classList.contains("hide")) {
      console.error("[player] timeout: stream did not start in 25s");
      showError("Yayın yanıt vermiyor. Kaynak engellemiş olabilir (CORS / Referer).");
    }
  }, 25000);

  $retry.addEventListener("click", () => { retryCount = 0; started = false; startOnce(); });
  window.addEventListener("beforeunload", destroyStream);
})();
</script>
</body>
</html>
